<style>
        body {
            background: radial-gradient(circle at 50% 50%, #171f33 0%, #0b1326 100%);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .glass-darker {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .game-cell {
            aspect-ratio: 1 / 1;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .game-cell:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .game-cell:active {
            transform: scale(0.95);
        }

        .token-x {
            color: #4d8eff;
            text-shadow: 0 0 15px rgba(77, 142, 255, 0.6);
            animation: bloom 0.3s ease-out;
        }

        .token-o {
            color: #ffb0cd;
            text-shadow: 0 0 15px rgba(255, 176, 205, 0.6);
            animation: bloom 0.3s ease-out;
        }

        @keyframes bloom {
            0% { transform: scale(0.5); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        .winner-line {
            position: absolute;
            background: white;
            z-index: 10;
            transition: all 0.5s ease;
            box-shadow: 0 0 20px white;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Material Symbols Customization */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .nav-item-active {
            background: rgba(77, 142, 255, 0.2);
            color: #adc6ff;
        }
    </style>

<script>
        const board = document.getElementById('game-board');
        const cells = document.querySelectorAll('.game-cell');
        const turnIndicator = document.getElementById('turn-indicator');
        const scoreXEl = document.getElementById('score-x');
        const scoreOEl = document.getElementById('score-o');
        const scoreDrawEl = document.getElementById('score-draw');
        const restartBtn = document.getElementById('restartBtn');
        const undoBtn = document.getElementById('undoBtn');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const resultModal = document.getElementById('result-modal');
        const resultTitle = document.getElementById('result-title');
        const resultText = document.getElementById('result-text');
        const modalRestart = document.getElementById('modal-restart');
        const confettiBox = document.getElementById('confetti');

        let gameState = Array(9).fill(null);
        let currentPlayer = 'X';
        let gameActive = true;
        let gameMode = 'pvp'; // pvp, easy, medium, hard
        let history = [];
        let scores = JSON.parse(localStorage.getItem('neon-strike-scores')) || { x: 0, o: 0, draw: 0 };
        let isSoundOn = true;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // cols
            [0, 4, 8], [2, 4, 6]             // diagonals
        ];

        function init() {
            updateScoreUI();
            cells.forEach(cell => cell.addEventListener('click', handleCellClick));
            restartBtn.addEventListener('click', resetGame);
            modalRestart.addEventListener('click', resetGame);
            undoBtn.addEventListener('click', undoMove);
            
            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    modeBtns.forEach(b => b.classList.remove('bg-white/10', 'border-primary/40'));
                    btn.classList.add('bg-white/10', 'border-primary/40');
                    gameMode = btn.dataset.mode;
                    resetGame();
                });
            });

            document.getElementById('soundToggle').addEventListener('click', function() {
                isSoundOn = !isSoundOn;
                this.querySelector('span').textContent = isSoundOn ? 'volume_up' : 'volume_off';
            });

            // Keyboard Support
            window.addEventListener('keydown', (e) => {
                if (e.key >= 1 && e.key <= 9) {
                    handleCellClick({ target: cells[e.key - 1] });
                }
            });
        }

        function updateScoreUI() {
            scoreXEl.textContent = scores.x;
            scoreOEl.textContent = scores.o;
            scoreDrawEl.textContent = scores.draw;
            localStorage.setItem('neon-strike-scores', JSON.stringify(scores));
        }

        function handleCellClick(e) {
            const cell = e.target;
            const index = parseInt(cell.dataset.index);

            if (gameState[index] !== null || !gameActive || (gameMode !== 'pvp' && currentPlayer === 'O')) return;

            makeMove(index, 'X');

            if (gameActive && gameMode !== 'pvp') {
                setTimeout(aiMove, 600);
            }
        }

        function makeMove(index, player) {
            gameState[index] = player;
            cells[index].innerHTML = `<span class="token-${player.toLowerCase()}">${player}</span>`;
            history.push([...gameState]);
            
            if (isSoundOn) playPopSound();

            checkResult();
            
            if (gameActive) {
                currentPlayer = player === 'X' ? 'O' : 'X';
                turnIndicator.textContent = `Player ${currentPlayer}'s Turn`;
                turnIndicator.className = `absolute -bottom-12 left-1/2 -translate-x-1/2 text-sm font-label-caps uppercase tracking-tighter ${currentPlayer === 'X' ? 'text-primary' : 'text-secondary'}`;
            }
        }

        function checkResult() {
            let roundWon = false;
            let winningLine = null;

            for (let condition of winningConditions) {
                const [a, b, c] = condition;
                if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    roundWon = true;
                    winningLine = condition;
                    break;
                }
            }

            if (roundWon) {
                gameActive = false;
                const winner = gameState[winningLine[0]];
                scores[winner.toLowerCase()]++;
                updateScoreUI();
                showResult(winner);
                return;
            }

            if (!gameState.includes(null)) {
                gameActive = false;
                scores.draw++;
                updateScoreUI();
                showResult('Draw');
            }
        }

        function aiMove() {
            if (!gameActive) return;

            let move;
            if (gameMode === 'easy') {
                move = getRandomMove();
            } else if (gameMode === 'medium') {
                move = Math.random() > 0.5 ? minimax(gameState, 'O').index : getRandomMove();
            } else {
                move = minimax(gameState, 'O').index;
            }

            if (move !== undefined) {
                makeMove(move, 'O');
            }
        }

        function getRandomMove() {
            const available = gameState.map((v, i) => v === null ? i : null).filter(v => v !== null);
            return available[Math.floor(Math.random() * available.length)];
        }

        function minimax(newBoard, player) {
            const availSpots = newBoard.map((v, i) => v === null ? i : null).filter(v => v !== null);

            if (checkWin(newBoard, 'X')) return { score: -10 };
            if (checkWin(newBoard, 'O')) return { score: 10 };
            if (availSpots.length === 0) return { score: 0 };

            const moves = [];
            for (let i = 0; i < availSpots.length; i++) {
                let move = {};
                move.index = availSpots[i];
                newBoard[availSpots[i]] = player;

                if (player === 'O') {
                    let result = minimax(newBoard, 'X');
                    move.score = result.score;
                } else {
                    let result = minimax(newBoard, 'O');
                    move.score = result.score;
                }

                newBoard[availSpots[i]] = null;
                moves.push(move);
            }

            let bestMove;
            if (player === 'O') {
                let bestScore = -10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            } else {
                let bestScore = 10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            }
            return moves[bestMove];
        }

        function checkWin(board, player) {
